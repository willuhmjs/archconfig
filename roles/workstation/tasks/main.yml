---
- name: Remove conflicting packages
  become: true
  shell: |
    for pkg in jack2 yay hyprland-git hyprland-protocols-git hyprland-guiutils-git \
    hyprwire-git hyprcursor-git hyprtoolkit-git hyprutils-git hyprlang-git \
    hyprwayland-scanner-git hyprgraphics-git aquamarine-git avizo wlogout \
    nwg-look nwg-displays awww; do
      pacman -Rdd --noconfirm $pkg || true
    done
  ignore_errors: true

- name: Install core packages
  become: true
  pacman:
    name:
      - git
      - base-devel
      - cmake
      - cpio
      - pkgconf
      - gcc
      - bluez
      - bluez-utils
      - hyprland
      - nwg-look
      - nwg-displays
      - awww
      - waybar
      - wofi
      - mako
      - hyprlock
      - hypridle
      - cliphist
      - polkit-kde-agent
      - xdg-desktop-portal-hyprland
      - grim
      - slurp
      - wl-clipboard
      - kitty
      - dolphin
      - pipewire
      - pipewire-pulse
      - wireplumber
      - pipewire-alsa
      - pipewire-jack
      - sof-firmware
      - alsa-ucm-conf
      - network-manager-applet
      - blueman
      - pavucontrol
      - playerctl
      - brightnessctl
      - pamixer
      - power-profiles-daemon
      - mpv
      - btop
      - ttf-jetbrains-mono-nerd
      - otf-font-awesome
      - rsync
      - wlr-randr
      - qt5-graphicaleffects
      - qt5-quickcontrols2
      - qt5-svg
      - uwsm
      - greetd
      - greetd-tuigreet
      - terminus-font
    state: present
    update_cache: yes
  ignore_errors: true

- name: Install optional packages
  become: true
  pacman:
    name: "{{ (['firefox'] if install_firefox | bool else []) + (['discord'] if install_discord | bool else []) }}"
    state: present
    update_cache: yes
  when: install_firefox | bool or install_discord | bool
  ignore_errors: true

- name: Install productivity tools
  become: true
  pacman:
    name:
      - zathura
      - zathura-pdf-mupdf
      - pandoc-cli
      - texlive-basic
      - texlive-latex
      - texlive-latexextra
      - texlive-fontsrecommended
    state: present
    update_cache: yes
  ignore_errors: true

- name: Detect chassis type
  shell: hostnamectl chassis
  register: chassis_type_check
  changed_when: false
  ignore_errors: true

- name: Detect hardware type
  set_fact:
    is_laptop: "{{ 'laptop' in chassis_type_check.stdout | lower or 'notebook' in chassis_type_check.stdout | lower }}"

- name: Auto-set monitor_setup for laptops
  set_fact:
    monitor_setup: 'laptop'
  when: monitor_setup == 'auto' and is_laptop | bool

- name: Auto-set touchpad for laptops
  set_fact:
    has_touchpad: true
  when: is_laptop | bool and not has_touchpad | bool

- name: Detect GPU type
  shell: lspci | grep -i vga
  register: lspci_vga
  changed_when: false
  ignore_errors: true

- name: Auto-set gpu_type
  set_fact:
    gpu_type: "{{ 'nvidia' if 'nvidia' in lspci_vga.stdout | lower else ('amd' if 'amd' in lspci_vga.stdout | lower else ('intel' if 'intel' in lspci_vga.stdout | lower else 'auto')) }}"
  when: gpu_type == 'auto'

- name: Install NVIDIA drivers
  become: true
  pacman:
    name:
      - nvidia-dkms
      - nvidia-utils
      - libva-nvidia-driver
    state: present
  when: gpu_type == 'nvidia'
  ignore_errors: true

- name: Configure NVIDIA for Wayland
  become: true
  copy:
    dest: /etc/modprobe.d/nvidia.conf
    content: "options nvidia_drm modeset=1 fbdev=1"
    mode: '0644'
  when: gpu_type == 'nvidia'

- name: Allow passwordless pacman for AUR builds
  become: true
  shell: >
    echo "{{ ansible_facts['user_id'] }} ALL=(ALL) NOPASSWD: /usr/bin/pacman" > /etc/sudoers.d/10-installer-pacman && chmod 0440 /etc/sudoers.d/10-installer-pacman

- name: Create build directory
  file:
    path: /tmp/manual_builds
    state: directory
    mode: '0755'

- name: Build AUR packages
  shell: |
    rm -rf /tmp/manual_builds/{{ item }}
    git clone https://aur.archlinux.org/{{ item }}.git /tmp/manual_builds/{{ item }}
    cd /tmp/manual_builds/{{ item }}
    makepkg -si --noconfirm --needed
  loop:
    - avizo
    - wlogout
  ignore_errors: true

- name: Remove temporary sudoers rule
  become: true
  file:
    path: "/etc/sudoers.d/10-installer-pacman"
    state: absent

- name: Create config directories
  file:
    path: "{{ user_home }}/.config/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - hypr
    - waybar
    - wofi
    - kitty
    - wallpapers
    - avizo

- name: Create empty monitors.conf
  file:
    path: "{{ user_home }}/.config/hypr/monitors.conf"
    state: touch
    mode: '0644'

- name: Create backgrounds directory
  become: true
  file:
    path: /usr/share/backgrounds
    state: directory
    mode: '0755'

- name: Deploy wallpaper
  copy:
    src: placeholder_wallpaper.jpg
    dest: "{{ user_home }}/.config/wallpapers/current_wallpaper.jpg"
    mode: '0644'
  ignore_errors: true

- name: Deploy hyprland config
  template:
    src: hyprland.conf.j2
    dest: "{{ user_home }}/.config/hypr/hyprland.conf"
    mode: '0644'

- name: Deploy hyprlock config
  template:
    src: hyprlock.conf.j2
    dest: "{{ user_home }}/.config/hypr/hyprlock.conf"
    mode: '0644'

- name: Deploy hypridle config
  template:
    src: hypridle.conf.j2
    dest: "{{ user_home }}/.config/hypr/hypridle.conf"
    mode: '0644'

- name: Deploy waybar config
  template:
    src: waybar_config.j2
    dest: "{{ user_home }}/.config/waybar/config"
    mode: '0644'
  notify: Reload Waybar

- name: Deploy waybar style
  template:
    src: waybar_style.css.j2
    dest: "{{ user_home }}/.config/waybar/style.css"
    mode: '0644'
  notify: Reload Waybar

- name: Deploy wofi config
  template:
    src: wofi_config.j2
    dest: "{{ user_home }}/.config/wofi/config"
    mode: '0644'

- name: Deploy wofi style
  template:
    src: wofi_style.css.j2
    dest: "{{ user_home }}/.config/wofi/style.css"
    mode: '0644'

- name: Deploy kitty config
  template:
    src: kitty.conf.j2
    dest: "{{ user_home }}/.config/kitty/kitty.conf"
    mode: '0644'

- name: Deploy avizo config
  template:
    src: avizo_config.ini.j2
    dest: "{{ user_home }}/.config/avizo/config.ini"
    mode: '0644'

- name: Deploy avizo style
  template:
    src: avizo_style.css.j2
    dest: "{{ user_home }}/.config/avizo/style.css"
    mode: '0644'

- name: Update hyprpm
  shell: hyprpm update > /tmp/hyprpm_update.log 2>&1 || true
  ignore_errors: true

- name: Set console font
  become: true
  copy:
    dest: /etc/vconsole.conf
    content: |
      KEYMAP=us
      FONT=ter-v32n
    mode: '0644'

- name: Configure greetd
  become: true
  copy:
    dest: /etc/greetd/config.toml
    content: |
      [terminal]
      vt = 1

      [default_session]
      command = "tuigreet --time --remember --remember-user-session --asterisks --cmd 'uwsm start hyprland-uwsm.desktop'"
      user = "greeter"
    mode: '0644'

- name: Disable conflicting display managers
  become: true
  shell: |
    systemctl disable sddm gdm lightdm || true
    rm -f /etc/systemd/system/display-manager.service
  ignore_errors: true

- name: Enable services
  become: true
  shell: systemctl enable --now {{ item }}
  loop:
    - bluetooth
    - power-profiles-daemon
    - NetworkManager
    - greetd
  ignore_errors: true
