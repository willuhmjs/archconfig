---
- name: Remove conflicting jack2 package
  become: true
  shell: pacman -Rdd --noconfirm jack2
  ignore_errors: true

- name: Install Core Arch Packages
  become: true
  pacman:
    name:
      - git
      - base-devel
      - cmake
      - cpio
      - pkgconf
      - gcc
      - bluez
      - bluez-utils
      - waybar
      - wofi
      - mako
      - hyprlock
      - hypridle
      - cliphist
      - polkit-kde-agent
      - xdg-desktop-portal-hyprland
      - grim
      - slurp
      - wl-clipboard
      - kitty
      - dolphin
      - pipewire
      - pipewire-pulse
      - wireplumber
      - pipewire-alsa
      - pipewire-jack
      - sof-firmware
      - alsa-ucm-conf
      - network-manager-applet
      - blueman
      - pavucontrol
      - playerctl
      - brightnessctl
      - pamixer
      - power-profiles-daemon
      - mpv
      - btop
      - ttf-jetbrains-mono-nerd
      - otf-font-awesome
      - rsync
      - wlr-randr
      - qt5-graphicaleffects
      - qt5-quickcontrols2
      - qt5-svg
      - uwsm
      - greetd
      - greetd-tuigreet
      - terminus-font
    state: present
    update_cache: yes
  ignore_errors: true

- name: Install other optional packages
  become: true
  pacman:
    name: "{{ (['firefox'] if install_firefox | bool else []) + (['discord'] if install_discord | bool else []) }}"
    state: present
    update_cache: yes
  when: install_firefox | bool or install_discord | bool
  ignore_errors: true

- name: Install productivity tools
  become: true
  pacman:
    name:
      - zathura
      - zathura-pdf-mupdf
      - pandoc-cli
      - texlive-basic
      - texlive-latex
      - texlive-latexextra
      - texlive-fontsrecommended
    state: present
    update_cache: yes
  ignore_errors: true

- name: Detect hardware chassis type
  shell: hostnamectl chassis
  register: chassis_type_check
  changed_when: false
  ignore_errors: true

- name: Detect hardware type
  set_fact:
    is_laptop: "{{ 'laptop' in chassis_type_check.stdout | lower or 'notebook' in chassis_type_check.stdout | lower }}"

- name: Set monitor_setup to laptop if auto and laptop detected
  set_fact:
    monitor_setup: 'laptop'
  when: monitor_setup == 'auto' and is_laptop | bool

- name: Set has_touchpad to true if laptop detected and not explicitly set
  set_fact:
    has_touchpad: true
  when: is_laptop | bool and not has_touchpad | bool

- name: Detect GPU type via lspci
  shell: lspci | grep -i vga
  register: lspci_vga
  changed_when: false
  ignore_errors: true

- name: Set gpu_type fact if auto
  set_fact:
    gpu_type: "{{ 'nvidia' if 'nvidia' in lspci_vga.stdout | lower else ('amd' if 'amd' in lspci_vga.stdout | lower else ('intel' if 'intel' in lspci_vga.stdout | lower else 'auto')) }}"
  when: gpu_type == 'auto'

- name: Install NVIDIA Drivers
  become: true
  pacman:
    name:
      - nvidia-dkms
      - nvidia-utils
      - libva-nvidia-driver
    state: present
  when: gpu_type == 'nvidia'
  ignore_errors: true

- name: Configure NVIDIA explicitly for Wayland
  become: true
  copy:
    dest: /etc/modprobe.d/nvidia.conf
    content: "options nvidia_drm modeset=1 fbdev=1"
    mode: '0644'
  when: gpu_type == 'nvidia'

- name: Check if yay is installed
  shell: command -v yay
  register: yay_check
  ignore_errors: true

- name: Clone yay
  git:
    repo: https://aur.archlinux.org/yay.git
    dest: /tmp/yay
  when: yay_check.rc != 0

- name: Build yay
  command: makepkg -s --noconfirm
  args:
    chdir: /tmp/yay
  when: yay_check.rc != 0

- name: Install yay
  become: true
  shell: pacman -U --noconfirm /tmp/yay/yay-*.pkg.tar.zst
  when: yay_check.rc != 0

- name: Temporarily allow passwordless pacman for yay
  become: true
  shell: >
    echo "{{ ansible_facts['user_id'] }} ALL=(ALL) NOPASSWD: /usr/bin/pacman" > /etc/sudoers.d/10-installer-pacman && chmod 0440 /etc/sudoers.d/10-installer-pacman

- name: Remove conflicting hyprland packages before installing git versions
  become: true
  shell: for pkg in hyprland hyprutils hyprlang hyprcursor hyprwayland-scanner aquamarine; do pacman -Rdd --noconfirm $pkg || true; done
  ignore_errors: true

- name: Install AUR packages
  shell: yay -S --noconfirm --needed hyprland-git avizo nwg-look nwg-displays wlogout awww
  ignore_errors: true

- name: Remove temporary passwordless pacman config
  become: true
  file:
    path: "/etc/sudoers.d/10-installer-pacman"
    state: absent

- name: Create configuration directories
  file:
    path: "{{ user_home }}/.config/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - hypr
    - waybar
    - wofi
    - kitty
    - wallpapers
    - avizo

- name: Create empty monitors.conf to prevent Hyprland crash
  file:
    path: "{{ user_home }}/.config/hypr/monitors.conf"
    state: touch
    mode: '0644'

- name: Create System Backgrounds Directory
  become: true
  file:
    path: /usr/share/backgrounds
    state: directory
    mode: '0755'

- name: Deploy Placeholder Wallpaper
  copy:
    src: placeholder_wallpaper.jpg
    dest: "{{ user_home }}/.config/wallpapers/current_wallpaper.jpg"
    mode: '0644'
  ignore_errors: true

- name: Deploy Hyprland Configuration
  template:
    src: hyprland.conf.j2
    dest: "{{ user_home }}/.config/hypr/hyprland.conf"
    mode: '0644'

- name: Deploy Hyprlock Configuration
  template:
    src: hyprlock.conf.j2
    dest: "{{ user_home }}/.config/hypr/hyprlock.conf"
    mode: '0644'

- name: Deploy Professional Waybar Configuration
  template:
    src: waybar_config.j2
    dest: "{{ user_home }}/.config/waybar/config"
    mode: '0644'
  notify: Reload Waybar

- name: Deploy Minimalist Waybar Styles
  template:
    src: waybar_style.css.j2
    dest: "{{ user_home }}/.config/waybar/style.css"
    mode: '0644'
  notify: Reload Waybar

- name: Deploy Mac-Style Wofi Configuration
  template:
    src: wofi_config.j2
    dest: "{{ user_home }}/.config/wofi/config"
    mode: '0644'

- name: Deploy Mac-Style Wofi Styles
  template:
    src: wofi_style.css.j2
    dest: "{{ user_home }}/.config/wofi/style.css"
    mode: '0644'

- name: Deploy Kitty Configuration
  template:
    src: kitty.conf.j2
    dest: "{{ user_home }}/.config/kitty/kitty.conf"
    mode: '0644'

- name: Deploy Avizo Configuration
  template:
    src: avizo_config.ini.j2
    dest: "{{ user_home }}/.config/avizo/config.ini"
    mode: '0644'

- name: Deploy Avizo Styles
  template:
    src: avizo_style.css.j2
    dest: "{{ user_home }}/.config/avizo/style.css"
    mode: '0644'

- name: Update Hyprland Plugin Headers safely
  shell:
    cmd: |
      hyprpm update > /tmp/hyprpm_update.log 2>&1 || true
    executable: /bin/bash
  ignore_errors: true

- name: Set larger console font for HiDPI
  become: true
  copy:
    dest: /etc/vconsole.conf
    content: |
      KEYMAP=us
      FONT=ter-v32n
    mode: '0644'

- name: Configure greetd to use tuigreet
  become: true
  copy:
    dest: /etc/greetd/config.toml
    content: |
      [terminal]
      vt = 1

      [default_session]
      command = "tuigreet --time --remember --remember-user-session --asterisks --cmd 'uwsm start hyprland-uwsm.desktop'"
      user = "greeter"
    mode: '0644'

- name: Disable conflicting display managers
  become: true
  shell: |
    systemctl disable sddm gdm lightdm || true
    rm -f /etc/systemd/system/display-manager.service
  ignore_errors: true

- name: Enable systemd services
  become: true
  shell: systemctl enable --now {{ item }}
  loop:
    - bluetooth
    - power-profiles-daemon
    - NetworkManager
    - greetd
  ignore_errors: true
